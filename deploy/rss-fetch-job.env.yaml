# Yhteiset ja palvelukohtaiset ympäristömuuttujat rss-fetch-jobille.
# Cloud Run Job lukee tämän tiedoston automaattisesti --env-vars-file -parametrilla.

# Kaikille palveluille yhteiset muuttujat
GCP_PROJECT: "uutisseuranta-activitystreams"
BQ_DATASET: "activitystreams"
BQ_LOCATION: "europe-north1"
BQ_TABLE: "objects"
SERVICE_ACCOUNT_EMAIL: "backend@uutisseuranta-activitystreams.iam.gserviceaccount.com"

# rss-fetch-job -kohtaiset muuttujat
REQUEST_TIMEOUT: "10"

# RSS-syöteluettelo JSON-muodossa. 
# "autodiscover": true hakee dynaamisesti valtioneuvoston syöteosoitteen ja tallentaa sen config-tauluun.
RSS_FEEDS: '[
  {"name": "hs", "url": "https://www.hs.fi/rss/tuoreimmat.xml"},
  {"name": "iltalehti", "url": "https://www.iltalehti.fi/rss/uutiset.xml"},
  {"name": "is", "url": "https://www.is.fi/rss/tuoreimmat.xml"},
  {"name": "kauppalehti", "url": "https://feeds.kauppalehti.fi/rss/main"},
  {"name": "mtv", "url": "https://www.mtvuutiset.fi/rss.xml"},
  {"name": "valtioneuvosto", "url": "https://valtioneuvosto.fi", "autodiscover": true}
]'
