[tool.ruff]
# Lähdekoodin sijainti — Ruff etsii Python-tiedostot täältä
src = ["src"]
# Rivitysrajan normi; 160 on salliva mutta OK datapipeline-koodille (pitkät BigQuery-kyselyt)
line-length = 160
# Kohde-Python-versio — vastaa Cloud Run -ympäristön Python-versiota
target-version = "py311"

[tool.ruff.lint]
# Valitut sääntöryhmät tyylille ja tietoturvalle
select = [
    "E",   # pycodestyle: PEP8-virheet (sisennysongelmat, ylimääräiset välilyönnit)
    "W",   # pycodestyle: PEP8-varoitukset (rivinpäätösongelmat)
    "F",   # pyflakes: kriittiset koodivirheet (käyttämättömät importit, määrittelemättömät nimet)
    "I",   # isort: importtijärjestys (stdlib → third-party → local)
    "B",   # flake8-bugbear: hiljaiset suunnitteluvirheet (esim. mutatoituva oletusparametri)
    "S",   # flake8-bandit: SAST-tietoturvatarkistukset (kovakoodatut salasanat, subprocess-käyttö)
    # HUOM: "ANN" (type annotations) jätetty pois tarkoituksella — lisätään myöhemmin tarvittaessa
]

ignore = [
    "S608", # BigQuery-taulunimen ja projektin interpolointi (pakollista BigQueryssä, syötteet suojattu query_parameters:lla)
    "S105", # Mahdollinen kovakoodattu salasana ("token" vertailu mock-testiin)
    "B008", # FastAPI reittien argumentti-defaultit (esim. Query, Header, Depends)
    "B904", # Exception chaining (FastAPI HTTPExceptions ei tarvitse 'from e' ketjutusta koska virheet logitetaan)
    "S110", # try-except-pass (sallittu hiljaisissa fallback-operaatioissa)
    "E501", # Rivipituuden ylitykset (sallitaan 160 merkkiin asti, koodiriveille ei pakoteta tiukasti)
]

[tool.ruff.lint.per-file-ignores]
# Testitiedostoissa sallitaan bandit-tietoturvaohitukset (esim. assertit) ja pitkät rivit (JSON-payloadit)
# HUOM: unit-test.sh on shell-skripti — Ruff ei koskaan tarkista sitä, joten sille ei tarvitse per-file-ignores-sääntöä
"**/test_*.py" = ["S101", "E501"]
